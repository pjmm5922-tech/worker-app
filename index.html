<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>양정3구역 근로자 조회</title>

<script>
  var APP_URL = "https://script.google.com/macros/s/AKfycbzIKGWNw90lMemqix8wRwgdn5HqB4_WVJleewLtfYwY3kNvDbFTZehK5W9swD45TBazYg/exec";
</script>

<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e50c8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
    background: #eef1f5; color: #1c2434; padding-bottom: 60px;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 14px; }
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: linear-gradient(160deg, #1e50c8, #1a3fa0);
    padding: calc(env(safe-area-inset-top, 0px) + 18px) 0 18px; border-radius: 0 0 22px 22px;
    box-shadow: 0 4px 14px rgba(26, 63, 160, .25);
  }
  .topbar h1 { color: #fff; font-size: 19px; font-weight: 800; text-align: center; }
  .topbar .subtitle { color: rgba(255,255,255,.75); font-size: 12.5px; text-align: center; margin: 3px 0 14px; }
  .searchbar {
    display: flex; gap: 8px; background: #fff; border-radius: 16px; padding: 6px;
    box-shadow: 0 2px 10px rgba(0,0,0,.18);
  }
  .searchbar input {
    flex: 1; min-width: 0; font-size: 19px; padding: 12px 10px 12px 14px;
    border: 0; border-radius: 12px; outline: none; background: transparent;
  }
  .searchbar button {
    font-size: 17px; font-weight: 800; padding: 0 22px; border: 0; border-radius: 12px;
    background: #1e50c8; color: #fff; flex-shrink: 0;
  }
  .searchbar button:active { background: #16409f; }
  .statusline { font-size: 13px; color: #6b7688; margin: 14px 4px 2px; }
  .msg { text-align: center; color: #8a93a5; font-size: 16px; line-height: 1.7; padding: 56px 0; }
  .msg .big { font-size: 40px; display: block; margin-bottom: 10px; }
  .spinner { text-align: center; padding: 50px 0; font-size: 16px; color: #1e50c8; font-weight: 700; display: none; }
  .card {
    background: #fff; border-radius: 18px; margin-top: 12px;
    box-shadow: 0 1px 4px rgba(20, 30, 60, .08); overflow: hidden;
  }
  .card-head { padding: 16px 18px 14px; cursor: pointer; }
  .name-line { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .nm { font-size: 23px; font-weight: 800; }
  .age { font-size: 14px; color: #6b7688; font-weight: 600; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .chip {
    font-size: 13px; font-weight: 700; color: #3c4a63; background: #f0f3f8;
    padding: 5px 11px; border-radius: 999px;
  }
  .edu {
    margin-top: 12px; padding: 11px 14px; border-radius: 12px;
    font-size: 15.5px; font-weight: 800; display: flex; align-items: center; gap: 8px;
  }
  .edu.ok { background: #e6f6ec; color: #157a3c; }
  .edu.no { background: #fdeaea; color: #c22525; }
  .edu small { font-weight: 600; font-size: 13px; opacity: .85; margin-left: auto; }
  .tapmore { text-align: center; font-size: 12.5px; color: #a3acbd; padding: 0 0 12px; }
  .card.open .tapmore { display: none; }
  .detail { display: none; padding: 0 14px 16px; }
  .card.open .detail { display: block; }
  .sec { background: #f7f9fc; border-radius: 14px; padding: 4px 16px 12px; margin-top: 10px; }
  .sec h3 { font-size: 13.5px; font-weight: 800; color: #1e50c8; padding: 12px 0 4px; letter-spacing: .3px; }
  .item { padding: 9px 0; border-bottom: 1px solid #eceff5; }
  .item:last-child { border-bottom: 0; }
  .item .k { font-size: 12.5px; color: #8a93a5; font-weight: 600; margin-bottom: 3px; }
  .item .v { font-size: 17px; line-height: 1.45; word-break: break-all; }
  .grade-chip {
    display: inline-block; font-weight: 800; font-size: 16px;
    padding: 3px 12px; border-radius: 8px; background: #e8efff; color: #1e50c8;
  }
  .callbtns { display: flex; gap: 8px; margin-top: 10px; }
  .callbtn {
    flex: 1; text-align: center; text-decoration: none; font-size: 15.5px; font-weight: 800;
    padding: 13px 6px; border-radius: 12px; background: #1e50c8; color: #fff;
  }
  .callbtn.sub2 { background: #eef2fa; color: #1e50c8; }
  .src { margin-top: 12px; font-size: 11.5px; color: #a3acbd; text-align: right; }
  #pinView {
    position: fixed; inset: 0; z-index: 100; padding: 24px;
    background: linear-gradient(160deg, #1e50c8, #142e73);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  #pinView img { width: 90px; height: 90px; border-radius: 22px; box-shadow: 0 8px 30px rgba(0,0,0,.35); }
  #pinView h2 { color: #fff; font-size: 21px; font-weight: 800; }
  #pinView p { color: #b9ccf5; font-size: 14px; }
  #pinView input {
    font-size: 26px; text-align: center; letter-spacing: 10px; padding: 14px;
    border: 0; border-radius: 14px; width: 230px; outline: none;
  }
  #pinErr { color: #ffb3b3; font-size: 14px; min-height: 20px; font-weight: 600; }
  #pinView button {
    font-size: 18px; font-weight: 800; padding: 14px 52px; border: 0; border-radius: 14px;
    background: #fff; color: #1e50c8;
  }
</style>
</head>
<body>

<div id="pinView">
  <img src="icon-192.png" alt="">
  <h2>양정3구역 근로자 조회</h2>
  <p>접속 비밀번호를 입력하세요</p>
  <input id="pinInput" type="tel" inputmode="numeric" autocomplete="off">
  <div id="pinErr"></div>
  <button onclick="enterPin()">확 인</button>
</div>

<div class="topbar">
  <div class="wrap">
    <h1>양정3구역 신규근로자 조회</h1>
    <div class="subtitle">이름 검색 → 인적사항 · 신규교육 이수 확인</div>
    <div class="searchbar">
      <input id="q" type="search" placeholder="이름 입력 (2글자 이상)" autocomplete="off">
      <button onclick="doSearch()">검색</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="spinner" id="spin">🔍 검색 중입니다...</div>
  <div id="results">
    <div class="msg"><span class="big">👷</span>이름을 입력하고<br>검색 버튼을 누르세요</div>
  </div>
</div>

<script>
var PIN = localStorage.getItem('yj3_pin') || '';
if (PIN) document.getElementById('pinView').style.display = 'none';

function enterPin() {
  var v = document.getElementById('pinInput').value.trim();
  if (!v) return;
  PIN = v;
  document.getElementById('pinView').style.display = 'none';
  document.getElementById('q').focus();
}
document.getElementById('pinInput').addEventListener('keydown', function(e){ if (e.key === 'Enter') enterPin(); });
document.getElementById('q').addEventListener('keydown', function(e){ if (e.key === 'Enter') { e.target.blur(); doSearch(); } });

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function item(k, v, isHtml) {
  if (!v) return '';
  return '<div class="item"><div class="k">' + k + '</div><div class="v">' + (isHtml ? v : esc(v)) + '</div></div>';
}

/* ---- 데이터 요청: ① fetch(POST) 시도 → 실패 시 ② JSONP 로 자동 전환 ---- */
function apiSearch(q, pin, onOk, onErr) {
  fetch(APP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ q: q, pin: pin }),
    redirect: 'follow'
  })
  .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(onOk)
  .catch(function(){ jsonpSearch(q, pin, onOk, onErr); });
}
function jsonpSearch(q, pin, onOk, onErr) {
  var name = 'yj3cb_' + Math.floor(Math.random() * 1e9);
  var s = document.createElement('script');
  var timer = setTimeout(function(){ cleanup(); onErr(new Error('시간 초과')); }, 30000);
  function cleanup(){ clearTimeout(timer); delete window[name]; if (s.parentNode) s.parentNode.removeChild(s); }
  window[name] = function(res){ cleanup(); onOk(res); };
  s.onerror = function(){ cleanup(); onErr(new Error('연결 실패')); };
  s.src = APP_URL + '?q=' + encodeURIComponent(q) + '&pin=' + encodeURIComponent(pin) + '&callback=' + name;
  document.body.appendChild(s);
}

function doSearch() {
  var q = document.getElementById('q').value.trim();
  if (q.replace(/\s+/g,'').length < 2) { alert('이름을 2글자 이상 입력하세요.'); return; }
  document.getElementById('spin').style.display = 'block';
  document.getElementById('results').innerHTML = '';
  apiSearch(q, PIN, render, function(err){
    document.getElementById('spin').style.display = 'none';
    document.getElementById('results').innerHTML =
      '<div class="msg"><span class="big">⚠️</span>연결에 실패했습니다<br>인터넷 상태를 확인해 주세요<br><small>' + esc(err.message) + '</small></div>';
  });
}

function render(res) {
  document.getElementById('spin').style.display = 'none';
  var box = document.getElementById('results');
  if (!res || !res.ok) {
    var errText = (res && res.error) || '알 수 없는 오류';
    if (errText.indexOf('PIN') !== -1) {
      localStorage.removeItem('yj3_pin'); PIN = '';
      document.getElementById('pinErr').textContent = '비밀번호가 올바르지 않습니다.';
      document.getElementById('pinView').style.display = 'flex';
      return;
    }
    box.innerHTML = '<div class="msg"><span class="big">⚠️</span>' + esc(errText) + '</div>';
    return;
  }
  localStorage.setItem('yj3_pin', PIN);
  if (res.people.length === 0) {
    box.innerHTML = '<div class="msg"><span class="big">🔍</span>검색 결과가 없습니다<br>이름 철자를 확인해 주세요</div>';
    return;
  }
  var html = '<div class="statusline">검색 결과 <b>' + res.total + '명</b>' + (res.total > 30 ? ' (상위 30명 표시)' : '') + '</div>';
  res.people.forEach(function(p, i) {
    var eduBadge = p.eduDone
      ? '<div class="edu ok">✅ 신규교육 이수' + (p.eduWhen ? '<small>' + esc(p.eduWhen) + '</small>' : '') + '</div>'
      : '<div class="edu no">⚠️ 교육 이력 없음 — 신규교육 필요</div>';
    var chips = '';
    if (p.company) chips += '<span class="chip">🏢 ' + esc(p.company) + '</span>';
    if (p.trade)   chips += '<span class="chip">🔧 ' + esc(p.trade) + '</span>';
    if (p.blood)   chips += '<span class="chip">🩸 ' + esc(p.blood) + '형</span>';
    var callbtns = '';
    if (p.phone || p.guardian) {
      callbtns = '<div class="callbtns">';
      if (p.phone)    callbtns += '<a class="callbtn" href="tel:' + p.phone.replace(/[^0-9]/g,'') + '">📞 본인 전화</a>';
      if (p.guardian) callbtns += '<a class="callbtn sub2" href="tel:' + p.guardian.replace(/[^0-9]/g,'') + '">보호자 전화</a>';
      callbtns += '</div>';
    }
    var basic =
      item('생년월일', p.birth ? p.birth + (p.age ? '  (만 ' + p.age + '세' + (p.elderly ? ' · 고령자' : '') + ')' : '') : '')
      + item('성별', p.sex === 'M' ? '남' : (p.sex === 'F' ? '여' : p.sex))
      + item('신규채용일', p.hireDate)
      + item('연락처', p.phone)
      + item('보호자 연락처', p.guardian)
      + item('주소', p.addr);
    var edu =
      item('신규교육', p.eduDone ? '이수 완료' + (p.eduWhen ? ' (' + p.eduWhen + ')' : '') : '이력 없음')
      + item('교육이수일(기초안전)', p.eduDate)
      + item('교육기관', p.eduOrg);
    var health =
      item('혈압', p.bp)
      + item('기저질환', p.disease)
      + item('일반검진일', p.genExam)
      + item('배치 전 검진', (p.preExamDone || '') + (p.preExamDate ? '  (' + p.preExamDate + ')' : ''))
      + (p.grade ? item('판정', '<span class="grade-chip">' + esc(p.grade) + '</span>', true) : '')
      + item('검진 소견', p.examOpinion)
      + item('사후관리 소견', p.followOpinion)
      + item('유해인자', p.hazard)
      + item('비고', p.note);
    html += '<div class="card" id="c' + i + '">'
      + '<div class="card-head" onclick="document.getElementById(\'c' + i + '\').classList.toggle(\'open\')">'
      +   '<div class="name-line"><span class="nm">' + esc(p.name) + '</span>'
      +   (p.age ? '<span class="age">만 ' + esc(p.age) + '세</span>' : '') + '</div>'
      +   '<div class="chips">' + chips + '</div>'
      +   eduBadge
      + '</div>'
      + '<div class="tapmore">▼ 눌러서 상세보기</div>'
      + '<div class="detail">'
      +   (basic  ? '<div class="sec"><h3>👤 기본 정보</h3>' + basic + '</div>' : '')
      +   (edu    ? '<div class="sec"><h3>📋 교육</h3>' + edu + '</div>' : '')
      +   (health ? '<div class="sec"><h3>🏥 건강 · 검진</h3>' + health + '</div>' : '')
      +   callbtns
      +   '<div class="src">출처: ' + esc((p.sources || []).join(', ')) + '</div>'
      + '</div></div>';
  });
  box.innerHTML = html;
  if (res.people.length === 1) document.getElementById('c0').classList.add('open');
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
