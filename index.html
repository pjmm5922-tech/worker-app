<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>양정3구역 근로자 조회</title>
<script>
  var APP_URL = "https://script.google.com/macros/s/AKfycbzIKGWNw90lMemqix8wRwgdn5HqB4_WVJleewLtfYwY3kNvDbFTZehK5W9swD45TBazYg/exec";
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#101c3d">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Pretendard Variable', Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #eef1f7; color: #1a2138; padding-bottom: 70px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 16px; }

  /* ───────── 상단 헤더 ───────── */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: radial-gradient(120% 160% at 20% -20%, #2f6bff 0%, #1a2f66 45%, #101c3d 100%);
    padding: calc(env(safe-area-inset-top, 0px) + 22px) 0 24px;
    border-radius: 0 0 28px 28px;
    box-shadow: 0 10px 30px rgba(16, 28, 61, .35);
  }
  .brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 4px; }
  .brand img { width: 34px; height: 34px; border-radius: 9px; box-shadow: 0 3px 10px rgba(0,0,0,.3); }
  .brand h1 { color: #fff; font-size: 19px; font-weight: 800; letter-spacing: -.3px; }
  .subtitle { color: rgba(255,255,255,.55); font-size: 12.5px; text-align: center; margin-bottom: 18px; font-weight: 500; }
  .searchbar {
    display: flex; gap: 8px; background: #fff; border-radius: 18px; padding: 7px;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
  }
  .searchbar input {
    flex: 1; min-width: 0; font-size: 18px; font-weight: 600; padding: 12px 8px 12px 14px;
    border: 0; outline: none; background: transparent; color: #1a2138;
  }
  .searchbar input::placeholder { color: #a6aec2; font-weight: 500; }
  .searchbar button {
    font-size: 16px; font-weight: 800; padding: 0 24px; border: 0; border-radius: 13px;
    background: linear-gradient(135deg, #2f6bff, #1f4fd6); color: #fff; flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(47, 107, 255, .35);
  }
  .searchbar button:active { transform: scale(.96); }

  .statusline { font-size: 13px; color: #7b849c; margin: 18px 6px 4px; font-weight: 600; }
  .msg { text-align: center; color: #9aa3ba; font-size: 15.5px; line-height: 1.75; padding: 64px 0; font-weight: 500; }
  .msg .big { font-size: 46px; display: block; margin-bottom: 14px; }

  /* ───────── 스켈레톤 로딩 ───────── */
  .skel { background: #fff; border-radius: 20px; margin-top: 14px; padding: 18px; }
  .skel .l { height: 14px; border-radius: 7px; margin-bottom: 12px;
    background: linear-gradient(90deg, #edf0f6 25%, #f8f9fc 50%, #edf0f6 75%);
    background-size: 400% 100%; animation: shimmer 1.3s infinite; }
  .skel .l:nth-child(1) { width: 45%; height: 20px; }
  .skel .l:nth-child(2) { width: 70%; }
  .skel .l:nth-child(3) { width: 55%; margin-bottom: 0; }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }

  /* ───────── 결과 카드 ───────── */
  .card {
    background: #fff; border-radius: 20px; margin-top: 14px; overflow: hidden;
    box-shadow: 0 2px 10px rgba(26, 33, 56, .06);
    animation: rise .35s ease both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .card-head { padding: 18px 18px 16px; cursor: pointer; }
  .head-row { display: flex; align-items: center; gap: 13px; }
  .avatar {
    width: 48px; height: 48px; border-radius: 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 21px; font-weight: 800; color: #fff;
    background: linear-gradient(135deg, #2f6bff, #7c3aed);
  }
  .card:nth-child(3n) .avatar   { background: linear-gradient(135deg, #0ea5e9, #2f6bff); }
  .card:nth-child(3n+1) .avatar { background: linear-gradient(135deg, #f59e0b, #ef4444); }
  .who { flex: 1; min-width: 0; }
  .nm { font-size: 20px; font-weight: 800; letter-spacing: -.3px; }
  .meta { font-size: 13px; color: #7b849c; font-weight: 600; margin-top: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pill {
    flex-shrink: 0; font-size: 12.5px; font-weight: 800; padding: 7px 12px; border-radius: 999px;
    display: flex; align-items: center; gap: 5px;
  }
  .pill.ok { background: #e5f8ec; color: #0e9f4e; }
  .pill.no { background: #fdeced; color: #e0344a; }
  .edubar {
    margin-top: 14px; padding: 10px 14px; border-radius: 13px;
    font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px;
  }
  .edubar.ok { background: #f0faf4; color: #0e9f4e; }
  .edubar.no { background: #fef2f3; color: #e0344a; }
  .edubar.heat { background: #fff4e8; color: #c2620a; }
  .edubar .when { margin-left: auto; font-size: 12.5px; font-weight: 600; opacity: .8; }
  .edubar + .edubar { margin-top: 8px; }
  .tapmore { text-align: center; font-size: 12px; color: #b6bdcf; padding: 0 0 13px; font-weight: 600; }
  .card.open .tapmore { display: none; }

  /* ───────── 상세 ───────── */
  .detail { display: none; padding: 2px 16px 18px; }
  .card.open .detail { display: block; animation: rise .25s ease both; }
  .sec { border-top: 1px solid #f0f2f7; padding-top: 4px; margin-top: 4px; }
  .sec h3 {
    font-size: 12px; font-weight: 800; color: #2f6bff; letter-spacing: .6px;
    padding: 12px 2px 2px;
  }
  .item { display: flex; padding: 10px 2px; border-bottom: 1px solid #f5f6fa; gap: 12px; }
  .item:last-child { border-bottom: 0; }
  .item .k { width: 96px; flex-shrink: 0; color: #9aa3ba; font-size: 13px; font-weight: 600; padding-top: 2px; }
  .item .v { flex: 1; font-size: 15.5px; font-weight: 600; line-height: 1.5; word-break: break-all; color: #2a3452; }
  .grade-chip {
    display: inline-block; font-weight: 800; font-size: 14px;
    padding: 3px 12px; border-radius: 8px; background: #eef3ff; color: #1f4fd6;
  }
  .callbtns { display: flex; gap: 9px; margin-top: 14px; }
  .callbtn {
    flex: 1; text-align: center; text-decoration: none; font-size: 15px; font-weight: 800;
    padding: 14px 6px; border-radius: 14px; color: #fff;
    background: linear-gradient(135deg, #2f6bff, #1f4fd6);
    box-shadow: 0 5px 14px rgba(47, 107, 255, .3);
  }
  .callbtn.sub2 { background: #eef2fb; color: #1f4fd6; box-shadow: none; }
  .callbtn:active { transform: scale(.97); }
  .src { margin-top: 13px; font-size: 11px; color: #b6bdcf; text-align: right; font-weight: 600; }

  /* ───────── PIN 화면 ───────── */
  #pinView {
    position: fixed; inset: 0; z-index: 100; padding: 28px;
    background: radial-gradient(130% 130% at 50% -10%, #1a2f66 0%, #101c3d 55%, #0a1226 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  }
  #pinView img { width: 96px; height: 96px; border-radius: 24px; box-shadow: 0 14px 40px rgba(0,0,0,.5); margin-bottom: 6px; }
  #pinView h2 { color: #fff; font-size: 22px; font-weight: 800; letter-spacing: -.3px; }
  #pinView p { color: #7d8db8; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
  #pinView input {
    font-size: 28px; font-weight: 700; text-align: center; letter-spacing: 12px; padding: 15px;
    border: 0; border-radius: 16px; width: 240px; outline: none; background: #fff; color: #1a2138;
  }
  #pinErr { color: #ff8f9d; font-size: 13.5px; min-height: 20px; font-weight: 600; }
  #pinView button {
    font-size: 17px; font-weight: 800; padding: 15px 0; width: 240px; border: 0; border-radius: 16px;
    background: linear-gradient(135deg, #2f6bff, #1f4fd6); color: #fff;
    box-shadow: 0 8px 22px rgba(47, 107, 255, .4);
  }
  #pinView button:active { transform: scale(.97); }
</style>
</head>
<body>

<div id="pinView">
  <img src="icon-192.png" alt="">
  <h2>양정3구역 근로자 조회</h2>
  <p>접속 비밀번호를 입력하세요</p>
  <input id="pinInput" type="tel" inputmode="numeric" autocomplete="off">
  <div id="pinErr"></div>
  <button onclick="enterPin()">확인</button>
</div>

<div class="topbar">
  <div class="wrap">
    <div class="brand"><img src="icon-192.png" alt=""><h1>양정3구역 근로자 조회</h1></div>
    <div class="subtitle">이름 검색 · 인적사항 · 신규교육 이수 확인</div>
    <div class="searchbar">
      <input id="q" type="search" placeholder="이름 입력 (2글자 이상)" autocomplete="off">
      <button onclick="doSearch()">검색</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div id="results">
    <div class="msg"><span class="big">👷</span>이름을 입력하고<br>검색 버튼을 누르세요</div>
  </div>
</div>

<script>
var PIN = localStorage.getItem('yj3_pin') || '';
if (PIN) document.getElementById('pinView').style.display = 'none';

function enterPin() {
  var v = document.getElementById('pinInput').value.trim();
  if (!v) return;
  PIN = v;
  document.getElementById('pinView').style.display = 'none';
  document.getElementById('q').focus();
}
document.getElementById('pinInput').addEventListener('keydown', function(e){ if (e.key === 'Enter') enterPin(); });
document.getElementById('q').addEventListener('keydown', function(e){ if (e.key === 'Enter') { e.target.blur(); doSearch(); } });

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function item(k, v, isHtml) {
  if (!v) return '';
  return '<div class="item"><div class="k">' + k + '</div><div class="v">' + (isHtml ? v : esc(v)) + '</div></div>';
}

function apiSearch(q, pin, onOk, onErr) {
  fetch(APP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ q: q, pin: pin }),
    redirect: 'follow'
  })
  .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(onOk)
  .catch(function(){ jsonpSearch(q, pin, onOk, onErr); });
}
function jsonpSearch(q, pin, onOk, onErr) {
  var name = 'yj3cb_' + Math.floor(Math.random() * 1e9);
  var s = document.createElement('script');
  var timer = setTimeout(function(){ cleanup(); onErr(new Error('시간 초과')); }, 30000);
  function cleanup(){ clearTimeout(timer); delete window[name]; if (s.parentNode) s.parentNode.removeChild(s); }
  window[name] = function(res){ cleanup(); onOk(res); };
  s.onerror = function(){ cleanup(); onErr(new Error('연결 실패')); };
  s.src = APP_URL + '?q=' + encodeURIComponent(q) + '&pin=' + encodeURIComponent(pin) + '&callback=' + name;
  document.body.appendChild(s);
}

function doSearch() {
  var q = document.getElementById('q').value.trim();
  if (q.replace(/\s+/g,'').length < 2) { alert('이름을 2글자 이상 입력하세요.'); return; }
  document.getElementById('results').innerHTML =
    '<div class="skel"><div class="l"></div><div class="l"></div><div class="l"></div></div>' +
    '<div class="skel"><div class="l"></div><div class="l"></div><div class="l"></div></div>';
  apiSearch(q, PIN, render, function(err){
    document.getElementById('results').innerHTML =
      '<div class="msg"><span class="big">⚠️</span>연결에 실패했습니다<br>인터넷 상태를 확인해 주세요</div>';
  });
}

function render(res) {
  var box = document.getElementById('results');
  if (!res || !res.ok) {
    var errText = (res && res.error) || '알 수 없는 오류';
    if (errText.indexOf('PIN') !== -1) {
      localStorage.removeItem('yj3_pin'); PIN = '';
      document.getElementById('pinErr').textContent = '비밀번호가 올바르지 않습니다.';
      document.getElementById('pinView').style.display = 'flex';
      box.innerHTML = '<div class="msg"><span class="big">🔒</span>비밀번호를 다시 입력해 주세요</div>';
      return;
    }
    box.innerHTML = '<div class="msg"><span class="big">⚠️</span>' + esc(errText) + '</div>';
    return;
  }
  localStorage.setItem('yj3_pin', PIN);
  if (res.people.length === 0) {
    box.innerHTML = '<div class="msg"><span class="big">🔍</span>검색 결과가 없습니다<br>이름 철자를 확인해 주세요</div>';
    return;
  }
  var html = '<div class="statusline">검색 결과 ' + res.total + '명' + (res.total > 30 ? ' · 상위 30명 표시' : '') + '</div>';
  res.people.forEach(function(p, i) {
    var pill = p.eduDone
      ? '<div class="pill ok">✓ 교육이수</div>'
      : '<div class="pill no">! 미이수</div>';
    var edubar = p.eduDone
      ? '<div class="edubar ok">🎓 신규교육 이수 완료' + (p.eduWhen ? '<span class="when">' + esc(p.eduWhen) + '</span>' : '') + '</div>'
      : '<div class="edubar no">🚨 교육 이력 없음 · 신규교육 필요</div>';
    if (p.heat) {
      edubar += '<div class="edubar heat">🔥 열순응 대상 · ' + esc(p.heat.status) + '</div>';
    }
    var meta = [p.company, p.trade].filter(Boolean).join(' · ')
      + (p.age ? ' · 만 ' + p.age + '세' : '');
    var initial = esc(p.name.charAt(0));

    var callbtns = '';
    if (p.phone || p.guardian) {
      callbtns = '<div class="callbtns">';
      if (p.phone)    callbtns += '<a class="callbtn" href="tel:' + p.phone.replace(/[^0-9]/g,'') + '">📞 본인 전화</a>';
      if (p.guardian) callbtns += '<a class="callbtn sub2" href="tel:' + p.guardian.replace(/[^0-9]/g,'') + '">보호자 전화</a>';
      callbtns += '</div>';
    }
    var basic =
      item('생년월일', p.birth ? p.birth + (p.age ? ' (만 ' + p.age + '세' + (p.elderly ? ' · 고령자' : '') + ')' : '') : '')
      + item('성별', p.sex === 'M' ? '남' : (p.sex === 'F' ? '여' : p.sex))
      + item('신규채용일', p.hireDate)
      + item('혈액형', p.blood ? p.blood + '형' : '')
      + item('연락처', p.phone)
      + item('보호자', p.guardian)
      + item('주소', p.addr);
    var edu =
      item('신규교육', p.eduDone ? '이수 완료' + (p.eduWhen ? ' (' + p.eduWhen + ')' : '') : '이력 없음')
      + item('기초안전교육', p.eduDate)
      + item('교육기관', p.eduOrg);
    var heat = '';
    if (p.heat) {
      heat = item('상태', p.heat.status)
        + item('적용 기간', p.heat.period)
        + item('근무시간 계획', p.heat.schedule)
        + item('명단 채용일', p.heat.hire);
    }
    var health =
      item('혈압', p.bp)
      + item('기저질환', p.disease)
      + item('일반검진일', p.genExam)
      + item('배치 전 검진', (p.preExamDone || '') + (p.preExamDate ? ' (' + p.preExamDate + ')' : ''))
      + (p.grade ? item('판정', '<span class="grade-chip">' + esc(p.grade) + '</span>', true) : '')
      + item('검진 소견', p.examOpinion)
      + item('사후관리', p.followOpinion)
      + item('유해인자', p.hazard)
      + item('비고', p.note);

    html += '<div class="card" id="c' + i + '" style="animation-delay:' + (i * 60) + 'ms">'
      + '<div class="card-head" onclick="document.getElementById(\'c' + i + '\').classList.toggle(\'open\')">'
      +   '<div class="head-row">'
      +     '<div class="avatar">' + initial + '</div>'
      +     '<div class="who"><div class="nm">' + esc(p.name) + '</div><div class="meta">' + esc(meta) + '</div></div>'
      +     pill
      +   '</div>'
      +   edubar
      + '</div>'
      + '<div class="tapmore">눌러서 상세보기 ▾</div>'
      + '<div class="detail">'
      +   (basic  ? '<div class="sec"><h3>👤 기본 정보</h3>' + basic + '</div>' : '')
      +   (edu    ? '<div class="sec"><h3>📋 교육</h3>' + edu + '</div>' : '')
      +   (heat   ? '<div class="sec"><h3>🔥 열순응</h3>' + heat + '</div>' : '')
      +   (health ? '<div class="sec"><h3>🏥 건강 · 검진</h3>' + health + '</div>' : '')
      +   callbtns
      +   '<div class="src">출처: ' + esc((p.sources || []).join(', ')) + '</div>'
      + '</div></div>';
  });
  box.innerHTML = html;
  if (res.people.length === 1) document.getElementById('c0').classList.add('open');
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
